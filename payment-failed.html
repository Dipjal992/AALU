<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Payment Failed - Swad Restro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#3C2415,#5C3A28);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:white;border-radius:20px;padding:40px;text-align:center;max-width:450px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.icon{width:80px;height:80px;background:#f44336;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:40px;color:white}
h1{color:#3C2415;margin-bottom:10px}
p{color:#666;margin-bottom:20px}
.btn{display:inline-block;padding:14px 30px;background:#C17F59;color:white;text-decoration:none;border-radius:25px;font-weight:600;margin:10px}
.btn.retry{background:#f44336}
</style>
</head>
<body>
<div class='card'>
<div class='icon'>&#10007;</div>
<h1>Payment Failed</h1>
<p>Something went wrong with your payment.</p>
<a href='/' class='btn'>Back to Home</a>
<a href='/#menu' class='btn retry'>Try Again</a>
</div>
</body>
</html>
