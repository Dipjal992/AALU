<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Payment Successful - Swad Restro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#3C2415,#5C3A28);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:white;border-radius:20px;padding:40px;text-align:center;max-width:450px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.icon{width:80px;height:80px;background:#4CAF50;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:40px;color:white;animation:pop 0.5s ease}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.1)}100%{transform:scale(1)}}
h1{color:#3C2415;margin-bottom:10px;font-family:'Playfair Display',serif}
p{color:#666;margin-bottom:20px}
.details{background:#F5EDE3;padding:20px;border-radius:10px;margin:20px 0;text-align:left}
.details p{margin:8px 0;font-size:14px;color:#3C2415}
.btn{display:inline-block;padding:14px 30px;background:#C17F59;color:white;text-decoration:none;border-radius:25px;font-weight:600;margin:10px;transition:all 0.3s}
.btn:hover{background:#A05A3A}
</style>
</head>
<body>
<div class='card'>
<div class='icon'>&#10003;</div>
<h1>Payment Successful!</h1>
<p>Thank you for your order at Swad Restro</p>
<div class='details' id='details'>
<p><strong>Order ID:</strong> <span id='oid'>-</span></p>
<p><strong>Reference:</strong> <span id='ref'>-</span></p>
<p><strong>Amount:</strong> NPR <span id='amt'>-</span></p>
</div>
<a href='/' class='btn'>Back to Home</a>
</div>
<script>
const p=new URLSearchParams(location.search);
document.getElementById('oid').textContent=p.get('pid')||'N/A';
document.getElementById('ref').textContent=p.get('refId')||'N/A';
document.getElementById('amt').textContent=p.get('amt')||'0';
</script>
</body>
</html>
